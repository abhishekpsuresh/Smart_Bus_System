name: Deploy Smart Bus System

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd ~/Smart_Bus_System

            git pull origin main

            cd backend
            npm install

            pm2 restart smartbus-backend

            cd ../frontend
            npm install
            npm run build

            sudo systemctl restart nginx